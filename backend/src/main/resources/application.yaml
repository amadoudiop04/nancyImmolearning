server:
  # Render/PaaS injecte le port via $PORT ; 8080 en local.
  port: ${PORT:8080}

# Origines autorisées pour CORS (séparées par des virgules).
# En prod : mettre l'URL du frontend, ex. https://nancy-immo.netlify.app
app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:4200}

spring:
  config:
    import: optional:file:.env[.properties]
  datasource:
    url: jdbc:postgresql://${db_host:localhost}:${db_port:5432}/${db_name:nancyImmo}
    username: ${db_username:postgres}
    password: ${db_password:root}
    driver-class-name: org.postgresql.Driver
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
  jackson:
    deserialization:
      fail-on-null-for-primitives: false
