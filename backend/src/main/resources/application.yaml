server:
  # Render/PaaS injecte le port via $PORT ; 8080 en local.
  port: ${PORT:8080}

# Origines autorisées pour CORS (séparées par des virgules).
# En prod : mettre l'URL du frontend, ex. https://nancy-immo.netlify.app
app:
  cors:
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:4200}
  # URL du frontend (pour les redirections Stripe success/cancel).
  frontend-url: ${APP_FRONTEND_URL:http://localhost:4200}

# Paiements Stripe. Renseigner STRIPE_SECRET_KEY (clé test sk_test_…).
# Le webhook (optionnel) nécessite STRIPE_WEBHOOK_SECRET (whsec_…).
stripe:
  secret-key: ${STRIPE_SECRET_KEY:}
  webhook-secret: ${STRIPE_WEBHOOK_SECRET:}

spring:
  config:
    import: optional:file:.env[.properties]
  datasource:
    url: jdbc:postgresql://${db_host:localhost}:${db_port:5432}/${db_name:nancyImmo}
    username: ${db_username:postgres}
    password: ${db_password:root}
    driver-class-name: org.postgresql.Driver
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        format_sql: true
  jackson:
    deserialization:
      fail-on-null-for-primitives: false
  servlet:
    multipart:
      # Pièces justificatives uploadées (pièce d'identité, etc.)
      max-file-size: 10MB
      max-request-size: 12MB
