# Blueprint Render pour le backend Spring Boot (déploiement Docker).
# Render lit ce fichier pour créer le service automatiquement.
services:
  - type: web
    name: nancy-immo-api
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /
    envVars:
      # Connexion PostgreSQL (Neon). Colle la chaîne JDBC complète avec ?sslmode=require.
      - key: SPRING_DATASOURCE_URL
        sync: false
      - key: SPRING_DATASOURCE_USERNAME
        sync: false
      - key: SPRING_DATASOURCE_PASSWORD
        sync: false
      # Secret JWT : généré automatiquement et gardé secret par Render.
      - key: SECURITY_JWT_SECRET
        generateValue: true
      # URL du frontend Netlify (pour CORS). Ex : https://nancy-immo.netlify.app
      - key: APP_CORS_ALLOWED_ORIGINS
        sync: false
